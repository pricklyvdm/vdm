<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>8‑BIT DESKTOP — VADIM APONCHUK</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            user-select: none;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16"><polygon points="2,2 14,2 14,14 2,14" fill="black" stroke="white" stroke-width="1"/><polygon points="3,3 13,3 13,13 3,13" fill="white"/></svg>') 2 2, auto;
        }
        /* Telegram WebView fix: используем % вместо vh */
        html {
            height: 100%;
            overflow: hidden;
        }
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: 'Press Start 2P', monospace;
            background: #0a2f3a;
            position: relative;
        }
        /* ---- фоновое видео ---- */
        #bgVideo {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            object-fit: cover;
            z-index: -1;
            pointer-events: none;
            transform: scale(1.08);
            transform-origin: center center;
            filter: contrast(1.4) saturate(0.4) brightness(0.6);
        }
        /* ---- пиксельная сетка поверх видео ---- */
        #bgOverlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
            background-image:
                repeating-linear-gradient(
                    0deg,
                    rgba(0,0,0,0.18) 0px, rgba(0,0,0,0.18) 1px,
                    transparent 1px, transparent 4px
                ),
                repeating-linear-gradient(
                    90deg,
                    rgba(0,0,0,0.10) 0px, rgba(0,0,0,0.10) 1px,
                    transparent 1px, transparent 4px
                );
        }
        .desktop {
            position: relative;
            width: 100%;
            height: 100%;
            background: rgba(10, 70, 70, 0.45);
            background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 1px, transparent 2px);
            overflow: hidden;
            z-index: 1;
        }
        /* ---- иконки слева ---- */
        .desktop-icons-left {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 10;
        }
        .desktop-icons-right {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            z-index: 10;
        }
        .desktop-icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 88px;
            cursor: pointer;
            background: transparent;
            padding: 4px;
        }
        .desktop-icon:hover {
            background: #00000040;
            outline: 2px solid #ffffff;
            outline-offset: -1px;
        }
        /* пиксельные SVG-иконки */
        .icon-img {
            width: 48px;
            height: 48px;
            display: block;
            filter: drop-shadow(3px 3px 0 #000000);
            image-rendering: pixelated;
        }
        .icon-label {
            font-size: 9px;
            font-family: 'Press Start 2P', monospace;
            text-align: center;
            color: white;
            text-shadow: 2px 2px 0 #000000;
            background: #00000080;
            padding: 4px 6px;
            margin-top: 6px;
            letter-spacing: 1px;
        }
        /* ---- окна ---- */
        .window {
            position: absolute;
            background: #b0b0b0;
            border: 4px solid;
            border-color: #ffffff #5a5a5a #5a5a5a #ffffff;
            box-shadow: 6px 6px 0px #2b2b2b;
            min-width: 280px;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            z-index: 100;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
        }
        .window.maximized {
            width: 100% !important;
            height: 100% !important;
            top: 0 !important;
            left: 0 !important;
            border-width: 4px;
        }
        .title-bar {
            background: #000084;
            color: white;
            padding: 6px 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            cursor: grab;
            user-select: none;
        }
        .title-bar:active { cursor: grabbing; }
        .window-controls {
            display: flex;
            gap: 4px;
        }
        .win-btn {
            background: #c0c0c0;
            border: 2px solid;
            border-color: #ffffff #808080 #808080 #ffffff;
            width: 26px;
            height: 26px;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            line-height: 20px;
            cursor: pointer;
            font-family: monospace;
            padding: 0;
        }
        .win-btn:active { border-color: #808080 #ffffff #ffffff #808080; }
        .window-content {
            padding: 12px;
            background: #b0b0b0;
            flex-grow: 1;
            overflow: auto;
            font-size: 11px;
            font-family: 'Press Start 2P', monospace;
            color: #1a1a1a;
            user-select: text;
        }
        .window-content::-webkit-scrollbar {
            width: 14px;
            background: #b0b0b0;
            border-left: 2px solid #5a5a5a;
        }
        .window-content::-webkit-scrollbar-thumb {
            background: #c0c0c0;
            border: 2px outset #ffffff;
        }
        /* ---- контактная карточка ---- */
        .contact-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }
        .contact-photo {
            width: 240px;
            height: 240px;
            background: #808080;
            border: 4px inset #5a5a5a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .contact-photo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .contact-name {
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            background: #000000cc;
            color: #ffffa0;
            padding: 6px 10px;
            text-align: center;
        }
        .contact-email {
            font-family: monospace;
            background: #d4d0c8;
            padding: 6px 12px;
            border: 3px inset #808080;
            font-size: 12px;
            font-weight: bold;
            word-break: break-all;
        }
        .big-mail-btn {
            background: #c0c0c0;
            border: 4px outset #ffffff;
            padding: 8px 12px;
            font-family: 'Press Start 2P', monospace;
            font-size: 10px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }
        .big-mail-btn:active { border-style: inset; }
        /* ---- файловые списки ---- */
        .file-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .file-item {
            padding: 8px 10px;
            margin: 6px 0;
            background: #c0c0c0;
            border: 2px solid #808080;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            font-size: 11px;
            font-family: 'Press Start 2P', monospace;
        }
        .file-item:hover {
            background: #000080;
            color: white;
        }
        .file-icon {
            width: 20px;
            height: 20px;
            display: inline-block;
            image-rendering: pixelated;
            flex-shrink: 0;
        }
        .readme-text {
            background: #ffffc0;
            padding: 12px;
            border: 4px inset #808080;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            white-space: pre-wrap;
            user-select: text;
        }
        /* ---- полноэкранный просмотр ---- */
        .fullscreen-media {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000000dd;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .fullscreen-content {
            max-width: 90%;
            max-height: 90%;
            background: black;
            border: 6px ridge #c0c0c0;
            box-shadow: 8px 8px 0px #2b2b2b;
        }
        .fullscreen-content img, .fullscreen-content video {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
        }
        .close-fullscreen {
            position: absolute;
            top: 20px;
            right: 30px;
            background: #c0c0c0;
            border: 4px outset;
            padding: 8px 16px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
        }
        /* ---- уведомление ---- */
        .retro-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #000000;
            border: 4px ridge #c0c0c0;
            padding: 12px 24px;
            font-family: 'Press Start 2P', monospace;
            font-size: 11px;
            color: #aaffaa;
            z-index: 10001;
            box-shadow: 6px 6px 0px #5a5a5a;
            text-align: center;
            white-space: nowrap;
            animation: fadeOutUp 2.4s forwards;
        }
        @keyframes fadeOutUp {
            0%   { opacity: 1; bottom: 30px; }
            70%  { opacity: 1; }
            100% { opacity: 0; bottom: 80px; visibility: hidden; }
        }
        /* ---- iframe: сброс глобального cursor и pointer-events ---- */
        iframe {
            pointer-events: auto !important;
            cursor: auto !important;
            user-select: auto !important;
        }

        /* ========== МОБИЛЬНАЯ АДАПТАЦИЯ ========== */
        @media (max-width: 640px) {
            /* иконки */
            .desktop-icons-left  { top: 10px; left: 8px; gap: 12px; }
            .desktop-icons-right { top: 10px; right: 8px; }
            .desktop-icon        { width: 60px; padding: 2px; }
            .icon-img            { width: 32px; height: 32px; }
            .icon-label          { font-size: 6px; padding: 2px 4px; margin-top: 3px; letter-spacing: 0; }

            /* все окна: отступ 14px с каждой стороны */
            .window {
                width: calc(100% - 28px) !important;
                left: 14px !important;
                min-width: unset !important;
                box-shadow: 4px 4px 0 #2b2b2b;
            }
            #contactWindow {
                top: 90px !important;
                height: auto !important;
            }

            /* шапка */
            .title-bar  { font-size: 9px; padding: 5px 7px; }
            .win-btn    { width: 22px; height: 22px; font-size: 11px; line-height: 18px; }

            /* контакт */
            .contact-photo { width: 80px; height: 80px; }
            .contact-name  { font-size: 9px; }
            .contact-email { font-size: 10px; }
            .big-mail-btn  { font-size: 8px; padding: 6px 8px; }

            /* текстовые окна */
            .readme-text { font-size: 9px; padding: 8px; }
            .file-item   { font-size: 9px; padding: 6px 8px; gap: 8px; }

            /* полноэкранный плеер */
            .fullscreen-content { max-width: 99%; }
            .close-fullscreen   { top: 6px; right: 6px; font-size: 9px; padding: 5px 9px; }

            /* уведомление: компактное и отцентрированное */
            .retro-toast {
                font-size: 8px;
                padding: 8px 14px;
                white-space: normal;
                text-align: center;
                max-width: 78%;
                left: 50%;
                transform: translateX(-50%);
            }
        }
    </style>
</head>

    // ========== ПОЛНОЭКРАННЫЙ ПРОСМОТР ==========
    function openFullscreenMedia(src, mediaType) {
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-media';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'fullscreen-content';
        let mediaElement;
        if (mediaType === 'image') {
            mediaElement = document.createElement('img');
            mediaElement.src = src;
            mediaElement.alt = 'image';
        } else {
            mediaElement = document.createElement('video');
            mediaElement.src = src;
            mediaElement.controls = true;
            mediaElement.autoplay = false;
        }
        const closeBtn = document.createElement('button');
        closeBtn.innerText = '✖ ЗАКРЫТЬ';
        closeBtn.className = 'close-fullscreen';
        closeBtn.onclick = () => overlay.remove();
        contentDiv.appendChild(mediaElement);
        overlay.appendChild(contentDiv);
        overlay.appendChild(closeBtn);
        document.body.appendChild(overlay);
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
        document.addEventListener('keydown', function escHandler(e) {
            if (e.key === 'Escape') {
                overlay.remove();
                document.removeEventListener('keydown', escHandler);
            }
        });
    }

    // ========== YOUTUBE ПЛЕЕР ==========
    function openYouTube(videoId, title) {
        const overlay = document.createElement('div');
        overlay.className = 'fullscreen-media';

        // Ретро-окно
        const win = document.createElement('div');
        win.style.cssText = [
            'width: min(360px, 90vw)',
            'background: #b0b0b0',
            'border: 4px solid',
            'border-color: #fff #5a5a5a #5a5a5a #fff',
            'box-shadow: 8px 8px 0 #2b2b2b',
            'display: flex',
            'flex-direction: column',
            'overflow: hidden'
        ].join(';');

        // Шапка окна
        const titleBar = document.createElement('div');
        titleBar.style.cssText = [
            'background: #000084',
            'color: white',
            'padding: 6px 10px',
            'font-family: \'Press Start 2P\', monospace',
            'font-size: 10px',
            'display: flex',
            'justify-content: space-between',
            'align-items: center',
            'gap: 8px'
        ].join(';');
        const titleSpan = document.createElement('span');
        titleSpan.innerText = '▶ ' + title;
        titleSpan.style.overflow = 'hidden';
        titleSpan.style.textOverflow = 'ellipsis';
        titleSpan.style.whiteSpace = 'nowrap';
        const closeX = document.createElement('button');
        closeX.innerText = '✖';
        closeX.style.cssText = 'background:#c0c0c0;border:2px solid;border-color:#fff #808080 #808080 #fff;width:24px;height:24px;font-size:12px;cursor:pointer;flex-shrink:0;font-family:monospace;padding:0;';
        closeX.onclick = () => overlay.remove();
        titleBar.appendChild(titleSpan);
        titleBar.appendChild(closeX);

        // Обёртка под iframe 9:16
        const iframeWrap = document.createElement('div');
        iframeWrap.style.cssText = 'position:relative;width:100%;aspect-ratio:9/16;background:#000;';
        const iframe = document.createElement('iframe');
        iframe.src = 'https://www.youtube.com/embed/' + videoId + '?autoplay=1&mute=1&enablejsapi=1&rel=0&playsinline=1';
        iframe.allow = 'autoplay; encrypted-media; picture-in-picture; fullscreen';
        iframe.setAttribute('allowfullscreen', '');
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-presentation allow-popups allow-forms');
        iframe.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;border:none;display:block;pointer-events:auto;cursor:auto;';
        iframeWrap.appendChild(iframe);

        win.appendChild(titleBar);
        win.appendChild(iframeWrap);
        overlay.appendChild(win);
        document.body.appendChild(overlay);

        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
        document.addEventListener('keydown', function escYT(e) {
            if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escYT); }
        });
    }

    // ========== SVG ИКОНКИ ДЛЯ ФАЙЛОВ ==========
    function photoIcon() {
        return `<svg class="file-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="2" width="16" height="12" fill="#c0c0c0"/>
            <rect x="1" y="3" width="14" height="10" fill="#004080"/>
            <circle cx="8" cy="8" r="3" fill="#ffff00"/>
            <rect x="0" y="2" width="16" height="1" fill="#fff"/>
            <rect x="0" y="2" width="1" height="12" fill="#fff"/>
        </svg>`;
    }
    function videoIcon() {
        return `<svg class="file-icon" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg">
            <rect x="0" y="2" width="11" height="12" fill="#202020"/>
            <polygon points="3,5 3,11 8,8" fill="#00ff00"/>
            <rect x="11" y="3" width="5" height="2" fill="#808000"/>
            <rect x="11" y="7" width="5" height="2" fill="#808000"/>
            <rect x="11" y="11" width="5" height="2" fill="#808000"/>
        </svg>`;
    }

    // ========== ЗАПОЛНЕНИЕ ПАПОК ==========
    function populatePhotoFolder() {
        const container = document.getElementById('photo-list');
        container.innerHTML = '';
        CONFIG.photoList.forEach(path => {
            const fileName = path.split('/').pop();
            const li = document.createElement('li');
            li.className = 'file-item';
            li.innerHTML = `${photoIcon()}<span>${fileName}</span>`;
            li.addEventListener('click', (e) => {
                e.stopPropagation();
                openFullscreenMedia(path, 'image');
            });
            container.appendChild(li);
        });
        if (CONFIG.photoList.length === 0) {
            container.innerHTML = '<li class="file-item">⚠️ НЕТ ФАЙЛОВ</li>';
        }
    }

    function populateVideoFolder() {
        const container = document.getElementById('video-list');
        container.innerHTML = '';
        CONFIG.youtubeList.forEach(({ title, id }) => {
            const li = document.createElement('li');
            li.className = 'file-item';
            li.innerHTML = `${videoIcon()}<span>${title}</span>`;
            li.addEventListener('click', (e) => {
                e.stopPropagation();
                openYouTube(id, title);
            });
            container.appendChild(li);
        });
        if (CONFIG.youtubeList.length === 0) {
            container.innerHTML = '<li class="file-item">⚠️ НЕТ ВИДЕО</li>';
        }
    }

    // ========== УПРАВЛЕНИЕ ОКНАМИ ==========
    let activeZIndex = 300;
    const allWindows = document.querySelectorAll('.window');

    function bringToFront(win) {
        activeZIndex++;
        win.style.zIndex = activeZIndex;
    }

    function makeDraggable(win, titleBar) {
        let isDragging = false, startX, startY, startLeft, startTop;
        titleBar.style.cursor = 'grab';
        titleBar.addEventListener('mousedown', (e) => {
            if (win.classList.contains('maximized')) return;
            e.preventDefault();
            bringToFront(win);
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            startLeft = win.offsetLeft;
            startTop = win.offsetTop;
            titleBar.style.cursor = 'grabbing';
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('mouseup', onMouseUp);
        });
        function onMouseMove(e) {
            if (!isDragging) return;
            let dx = e.clientX - startX;
            let dy = e.clientY - startY;
            let newLeft = startLeft + dx;
            let newTop  = startTop + dy;
            newLeft = Math.min(Math.max(newLeft, -win.offsetWidth + 60), window.innerWidth - 60);
            newTop  = Math.min(Math.max(newTop, -win.offsetHeight + 40), window.innerHeight - 50);
            win.style.left = newLeft + 'px';
            win.style.top  = newTop  + 'px';
        }
        function onMouseUp() {
            isDragging = false;
            titleBar.style.cursor = 'grab';
            document.removeEventListener('mousemove', onMouseMove);
            document.removeEventListener('mouseup', onMouseUp);
        }

        // ---- touch drag ----
        titleBar.addEventListener('touchstart', (e) => {
            if (win.classList.contains('maximized')) return;
            const t  = e.touches[0];
            bringToFront(win);
            isDragging = true;
            startX    = t.clientX;
            startY    = t.clientY;
            startLeft = win.offsetLeft;
            startTop  = win.offsetTop;
            document.addEventListener('touchmove', onTouchMove, { passive: false });
            document.addEventListener('touchend',  onTouchEnd);
        }, { passive: true });
        function onTouchMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const t  = e.touches[0];
            let newLeft = startLeft + (t.clientX - startX);
            let newTop  = startTop  + (t.clientY - startY);
            newLeft = Math.min(Math.max(newLeft, -win.offsetWidth  + 60), window.innerWidth  - 60);
            newTop  = Math.min(Math.max(newTop,  -win.offsetHeight + 40), window.innerHeight - 50);
            win.style.left = newLeft + 'px';
            win.style.top  = newTop  + 'px';
        }
        function onTouchEnd() {
            isDragging = false;
            document.removeEventListener('touchmove', onTouchMove);
            document.removeEventListener('touchend',  onTouchEnd);
        }
    }

    function initMaximize(win, maxBtn) {
        let prevState = { width: null, height: null, top: null, left: null };
        maxBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            bringToFront(win);
            if (win.classList.contains('maximized')) {
                win.classList.remove('maximized');
                win.style.width  = prevState.width;
                win.style.height = prevState.height;
                win.style.top    = prevState.top;
                win.style.left   = prevState.left;
            } else {
                prevState.width  = win.style.width  || (win.offsetWidth  + 'px');
                prevState.height = win.style.height || (win.offsetHeight + 'px');
                prevState.top    = win.style.top    || (win.offsetTop    + 'px');
                prevState.left   = win.style.left   || (win.offsetLeft   + 'px');
                win.classList.add('maximized');
                win.style.width  = '100%';
                win.style.height = '100%';
                win.style.top    = '0';
                win.style.left   = '0';
            }
        });
    }

    function initClose(win, closeBtn) {
        closeBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            win.style.display = 'none';
        });
    }

    // Инициализация всех окон
    allWindows.forEach(win => {
        const titleBar = win.querySelector('.title-bar');
        const maxBtn   = win.querySelector('.maximize-btn');
        const closeBtn = win.querySelector('.close-btn');
        if (titleBar) makeDraggable(win, titleBar);
        if (maxBtn)   initMaximize(win, maxBtn);
        if (closeBtn) initClose(win, closeBtn);
        win.addEventListener('mousedown', () => bringToFront(win));
    });

    // ========== ОТКРЫТИЕ ОКОН ПО ИКОНКАМ ==========
    document.querySelectorAll('.desktop-icons-left .desktop-icon').forEach(icon => {
        icon.addEventListener('click', () => {
            const winId = icon.getAttribute('data-window');
            const targetWin = document.getElementById(winId);
            if (!targetWin) return;
            targetWin.style.display = 'flex';
            bringToFront(targetWin);
            if (!targetWin.classList.contains('maximized')) {
                if (isNaN(parseInt(targetWin.style.left))) targetWin.style.left = '100px';
                if (isNaN(parseInt(targetWin.style.top)))  targetWin.style.top  = '80px';
            }
            // текст вшит в HTML напрямую
        });
    });

    // Иконка КОНТАКТ — одиночный клик
    const contactShortcut = document.getElementById('contactShortcutIcon');
    if (contactShortcut) {
        contactShortcut.addEventListener('click', (e) => {
            e.stopPropagation();
            const cw = document.getElementById('contactWindow');
            if (cw) {
                cw.style.display = 'flex';
                bringToFront(cw);
            }
        });
    }

    // ========== КОПИРОВАНИЕ ПОЧТЫ ==========
    function showRetroToast(msg) {
        const existing = document.querySelector('.retro-toast');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.className = 'retro-toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }

    const copyBtn = document.getElementById('copyEmailBtn');
    copyBtn.addEventListener('click', async () => {
        try {
            await navigator.clipboard.writeText(CONFIG.email);
            showRetroToast('✓ ПОЧТА СКОПИРОВАНА: ' + CONFIG.email);
        } catch (err) {
            // fallback для старых браузеров
            const ta = document.createElement('textarea');
            ta.value = CONFIG.email;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showRetroToast('✓ ПОЧТА СКОПИРОВАНА: ' + CONFIG.email);
        }
    });

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    populatePhotoFolder();
    populateVideoFolder();

    // Текст вшит напрямую в HTML — fetch не нужен

    // Фокус на окне контакта
    const contactWin = document.getElementById('contactWindow');
    bringToFront(contactWin);

    // ========== МОБИЛЬНАЯ ИНИЦИАЛИЗАЦИЯ ==========
    if (window.innerWidth <= 640) {
        const pad = 14;
        const mobileW = (window.innerWidth - pad * 2) + 'px';
        document.querySelectorAll('.window').forEach(w => {
            w.style.width = mobileW;
            w.style.left  = pad + 'px';
        });
        contactWin.style.top    = '90px';
        contactWin.style.height = 'auto';
    }

    // Разрешаем выделение текста в контенте
    document.querySelectorAll('.window-content, .readme-text').forEach(el => el.style.userSelect = 'text');
    window.addEventListener('dragstart', (e) => { if (!e.target.closest('.fullscreen-media')) e.preventDefault(); });
</script>
</body>
